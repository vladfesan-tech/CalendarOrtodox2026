<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Ortodox</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b0000">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f7f3e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .calendar-app { background-color: #ffffff; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 450px; width: 100%; padding: 30px; text-align: center; border-top: 5px solid #8b0000; }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .year-subtitle { color: #777; font-size: 14px; margin-bottom: 20px; }
        .date-display { font-size: 22px; font-weight: bold; color: #8b0000; margin-bottom: 15px; }
        .saints-display { font-size: 16px; color: #444; min-height: 60px; margin-bottom: 20px; line-height: 1.5; }
        .rule-display { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 25px; }
        
        .rule-sarbatoare { background-color: #ffe6e6; color: #cc0000; border: 1px solid #ffcccc; }
        .rule-default { background-color: #f0f0f0; color: #555; border: 1px solid #ddd; }
        .rule-loading { background-color: #e6f2ff; color: #0055cc; border: 1px solid #cce0ff; }

        button { background-color: #8b0000; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { background-color: #660000; }
        hr { border: 0; height: 1px; background-color: #eee; margin: 30px 0; }
        .search-section h3 { font-size: 16px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; flex: 1; }
    </style>
</head>
<body>

<div class="calendar-app">
    <h1>Calendar Ortodox</h1>
    <div class="year-subtitle" id="anAfisat">Anul 2026</div>
    
    <div id="currentDateDisplay" class="date-display">Încărcare date de pe server...</div>
    <div id="saintsDisplay" class="saints-display">Te rugăm să aștepți...</div>
    <div id="ruleDisplay" class="rule-display rule-loading">⏳ Se descarcă calendarul...</div>
    
    <button onclick="goToNextDay()">▶ Ziua Următoare</button>
    <hr>
    
    <div class="search-section">
        <h3>Sari la o anumită dată:</h3>
        <div class="input-group">
            <input type="number" id="dayInput" placeholder="Ziua" min="1" max="31">
            <select id="monthInput">
                <option value="1">Ianuarie</option> <option value="2">Februarie</option> <option value="3">Martie</option>
                <option value="4">Aprilie</option> <option value="5">Mai</option> <option value="6">Iunie</option>
                <option value="7">Iulie</option> <option value="8">August</option> <option value="9">Septembrie</option>
                <option value="10">Octombrie</option> <option value="11">Noiembrie</option> <option value="12">Decembrie</option>
            </select>
        </div>
        <button onclick="jumpToDate()">Caută Ziua</button>
    </div>
</div>

<script>
    // Setăm datele principale
    const anCurent = 2026; 
    let currentDate = new Date(anCurent, 0, 1);
    let calendarExtern = null; // Aici vom salva datele descărcate

    const monthNames = ["Ianuarie", "Februarie", "Martie", "Aprilie", "Mai", "Iunie", "Iulie", "August", "Septembrie", "Octombrie", "Noiembrie", "Decembrie"];
    const daysOfWeek = ["Duminică", "Luni", "Marți", "Miercuri", "Joi", "Vineri", "Sâmbătă"];

    // 1. FUNCȚIA CARE PREIA DATELE DE PE SITE-UL EXTERN
    async function preiaDateleDePeServer() {
        try {
            // Cerem datele de la API-ul public (Atenție: anul trebuie să fie disponibil pe serverul lor)
            const response = await fetch(`https://azisespala.ro/data/holidays-${anCurent}.json`);
            
            if (!response.ok) {
                throw new Error("Datele pentru acest an nu sunt încă disponibile pe serverul extern.");
            }
            
            // Transformăm răspunsul în format JSON
            calendarExtern = await response.json();
            
            // După ce am descărcat cu succes, actualizăm afișajul
            updateDisplay();

        } catch (eroare) {
            document.getElementById("currentDateDisplay").innerText = "Eroare de conexiune";
            document.getElementById("saintsDisplay").innerText = "Nu am putut prelua datele de pe server. Mesaj eroare: " + eroare.message;
            document.getElementById("ruleDisplay").className = "rule-display rule-default";
            document.getElementById("ruleDisplay").innerText = "⚠ Lipsă date externe";
        }
    }

    // 2. FUNCȚIA CARE AFIȘEAZĂ ZIUA CURENTĂ
    function updateDisplay() {
        if (!calendarExtern) return; // Dacă nu s-au descărcat datele, nu facem nimic

        const d = currentDate.getDate();
        const m = currentDate.getMonth(); // în JS lunile sunt 0-11
        const dow = currentDate.getDay();
        
        // Afișăm data frumos
        document.getElementById("currentDateDisplay").innerText = `${daysOfWeek[dow]}, ${d} ${monthNames[m]}`;
        
        // Căutăm ziua în datele preluate. Structura lor este: calendarExtern["luna_1_la_12"][index_zi]
        const lunaAPI = (m + 1).toString();
        const ziuaCautata = d.toString();
        
        let sfintiText = "Sfinții nu au fost găsiți.";
        let esteSarbatoare = false;

        // Căutăm prin lista de zile a lunii respective
        if (calendarExtern[lunaAPI]) {
            const dateleZilei = calendarExtern[lunaAPI].find(item => item.date === ziuaCautata);
            
            if (dateleZilei) {
                sfintiText = dateleZilei.text;
                esteSarbatoare = dateleZilei.isHoliday; // API-ul ne spune dacă e cu cruce roșie (true/false)
            }
        }

        // Punem textul pe ecran
        document.getElementById("saintsDisplay").innerText = sfintiText;

        // Setăm regulile (postul îl calculăm noi din nou pentru Miercuri și Vineri, plus ce zice API-ul)
        const elRegula = document.getElementById("ruleDisplay");
        elRegula.className = "rule-display";

        if (esteSarbatoare) {
            elRegula.classList.add("rule-sarbatoare");
            elRegula.innerText = "✝ Sărbătoare (Cruce Roșie)";
        } else if (dow === 3 || dow === 5) {
            elRegula.classList.add("rule-default"); // Poți pune culoare de post aici dacă vrei
            elRegula.innerText = "🛑 Zi de Post (Miercuri/Vineri)";
        } else {
            elRegula.classList.add("rule-default");
            elRegula.innerText = "⚪ Zi obișnuită";
        }
    }

    // 3. FUNCȚIILE DE BUTOANE
    function goToNextDay() {
        currentDate.setDate(currentDate.getDate() + 1);
        if (currentDate.getFullYear() > anCurent) {
            currentDate = new Date(anCurent, 11, 31);
            alert("Ai ajuns la sfârșitul anului!");
            return;
        }
        updateDisplay();
    }

    function jumpToDate() {
        const d = parseInt(document.getElementById("dayInput").value);
        const m = parseInt(document.getElementById("monthInput").value) - 1; // scădem 1 pentru indexul de JS
        if (!d || d < 1 || d > 31) return alert("Zi invalidă!");
        
        const testDate = new Date(anCurent, m, d);
        if (testDate.getMonth() !== m) return alert("Data nu există în calendar!");
        
        currentDate = testDate;
        updateDisplay();
    }

    // 4. PORNIM APLICAȚIA
    // Când se încarcă pagina, apelăm automat site-ul extern
    window.onload = preiaDateleDePeServer;

</script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('PWA Service Worker înregistrat cu succes: ', registration.scope);
                })
                .catch((error) => {
                    console.log('Înregistrarea Service Worker a eșuat: ', error);
                });
        });
    }
</script>
</body>
</html>
